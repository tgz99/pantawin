# Pantawin Postgres tuning — deliberately small. The VPS is a shared,
# memory-constrained box (see prd/sentrynow-spec.md M0-M2 plan); these
# values are sized for "a handful of monitors at M0-M2 scale", not a
# dedicated database host. Revisit if/when monitor count or check volume
# grows materially (M4/M5 analytics rollups).
listen_addresses = '*'
max_connections = 20
shared_buffers = 64MB
work_mem = 4MB
maintenance_work_mem = 32MB
effective_cache_size = 128MB
wal_buffers = 2MB
min_wal_size = 80MB
max_wal_size = 256MB
