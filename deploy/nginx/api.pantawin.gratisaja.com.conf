# Copy to /etc/nginx/sites-available/api.pantawin.gratisaja.com on the VPS,
# then: ln -s /etc/nginx/sites-available/api.pantawin.gratisaja.com /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx (never `restart` — that drops every
# existing site's listeners momentarily).
#
# HTTP-only to start; certbot --nginx -d api.pantawin.gratisaja.com will
# rewrite this file to add the TLS server block and the :80 -> :443 redirect.
server {
    listen 80;
    listen [::]:80;
    server_name api.pantawin.gratisaja.com;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
