# Pantawin Redis — used as the check-scheduling sorted-set queue (spec 3.2).
# No persistence: queue state is fully rebuildable from Postgres
# (scheduler.EnsureScheduled reseeds it on boot), so RDB/AOF would only cost
# disk I/O and memory for no durability benefit we actually need.
maxmemory 32mb
maxmemory-policy noeviction
save ""
appendonly no
