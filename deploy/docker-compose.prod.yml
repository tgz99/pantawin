# Pantawin M0-M2 stack — deployed to /opt/pantawin on the VPS, entirely
# additive alongside the existing `anana`/MySQL/PM2 services on that box.
#
# Deliberate choices given the shared, memory-constrained VPS:
#   - Postgres/Redis publish NO host ports at all — Docker's own iptables
#     rules bypass ufw for published container ports, so "not publishing"
#     is the only reliable way to keep them off the public internet.
#   - The API is the only service with a host-published port, bound to
#     127.0.0.1 only — nginx reverse-proxies to it, it is never reachable
#     directly from the internet.
#   - Every service has an explicit mem_limit as a hard ceiling.

name: pantawin

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pantawin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pantawin
    volumes:
      - pantawin_pg_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    mem_limit: 160m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantawin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    mem_limit: 48m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:-pantawin-api:latest}
    build:
      context: ../server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: "0.0.0.0:8080"
      DATABASE_URL: postgres://pantawin:${POSTGRES_PASSWORD}@postgres:5432/pantawin?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SEED_MONITOR_NAME: ${SEED_MONITOR_NAME:-gratisaja.com}
      SEED_MONITOR_URL: ${SEED_MONITOR_URL:-https://gratisaja.com}
      # M2 email alerts: reach the host-installed Postfix relay via the
      # Docker host gateway (extra_hosts below). Until Postfix is installed,
      # sends fail gracefully (logged in notification_log) — the app runs
      # fine without it.
      SMTP_ADDR: ${SMTP_ADDR:-host.docker.internal:25}
      ALERT_FROM: ${ALERT_FROM:-alerts@pantawin.gratisaja.com}
      # M3 push: dormant until FCM_PROJECT_ID is set in .env and the
      # Firebase service-account JSON is placed at
      # deploy/fcm-service-account.json (gitignored, chmod 600).
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CREDENTIALS_FILE: ${FCM_CREDENTIALS_FILE:-}
    volumes:
      - ./fcm-service-account.json:/run/secrets/fcm-service-account.json:ro
    ports:
      - "127.0.0.1:8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pantawin_pg_data:
