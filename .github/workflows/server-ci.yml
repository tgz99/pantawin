name: server-ci

on:
  push:
    paths:
      - "server/**"
      - "deploy/**"
      - ".github/workflows/server-ci.yml"
  pull_request:
    paths:
      - "server/**"
      - "deploy/**"

defaults:
  run:
    working-directory: server

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test (unit)
        run: go test ./... -race -coverprofile=cover.out

      - name: coverage threshold
        run: |
          go tool cover -func=cover.out | tail -1
          pct=$(go tool cover -func=cover.out | tail -1 | grep -oE '[0-9]+\.[0-9]+')
          awk -v pct="$pct" 'BEGIN { if (pct+0 < 60) { print "coverage " pct "% is below the 60% floor"; exit 1 } }'

      - name: go test (integration, Docker available on the runner)
        run: go test -tags=integration ./... -run . -v

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: docker build (proves the image builds)
        run: docker build -t pantawin-api:ci .

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: deploy
    steps:
      - uses: actions/checkout@v4
      - name: docker compose up (ephemeral env for CI)
        run: |
          cat > .env <<EOF
          POSTGRES_PASSWORD=ci-only-password
          JWT_SECRET=ci-only-jwt-secret-not-for-prod
          ADMIN_EMAIL=ci@pantawin.gratisaja.com
          ADMIN_PASSWORD=ci-only-password
          EOF
          docker compose -f docker-compose.prod.yml --env-file .env up -d --build
      - name: wait for API health
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8081/healthz; then exit 0; fi
            sleep 2
          done
          echo "API never became healthy"
          docker compose -f docker-compose.prod.yml logs
          exit 1
      - name: smoke test — register + list monitors
        run: |
          set -e
          TOKENS=$(curl -sf -X POST http://127.0.0.1:8081/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"ci@pantawin.gratisaja.com","password":"ci-only-password"}')
          ACCESS=$(echo "$TOKENS" | grep -oE '"access_token":"[^"]+"' | cut -d'"' -f4)
          curl -sf http://127.0.0.1:8081/v1/monitors -H "Authorization: Bearer $ACCESS" | grep -q gratisaja.com
      - name: docker compose down
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
